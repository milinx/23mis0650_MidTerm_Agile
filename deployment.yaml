apiVersion: apps/v1
kind: Deployment
metadata:
  name: rivera-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rivera
  template:
    metadata:
      labels:
        app: rivera
    spec:
      containers:
      - name: rivera-container
        # CHANGE 'your_docker_username' TO YOUR ACTUAL USERNAME
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: rivera-service
spec:
  type: NodePort
  selector:
    app: rivera
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007 # This is the port you will use to view the site
